plugins {
    id 'java'
    id 'application'
}

group = 'illgner.ch'
version = '0.1.0'

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Entry point is the Swing dialog class with main()
    mainClass = 'illgner.ch.tantrix.GameDialog'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

// Create a runnable jar in addition to the application distribution
tasks.named('jar') {
    manifest {
        attributes(
                'Main-Class': 'illgner.ch.tantrix.GameDialog'
        )
    }
}

// Optional: JUnit 5 if you add tests later
dependencies {
    testImplementation(platform('org.junit:junit-bom:5.10.3'))
    testImplementation('org.junit.jupiter:junit-jupiter')
}

test {
    useJUnitPlatform()
}

